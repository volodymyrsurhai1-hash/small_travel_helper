<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Travel Dashboard ✈️</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="background-glow glow-2"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="hero-header">
            <div class="badge">AI-Powered Travel ETL</div>
            <h1>Smart Travel <span class="gradient-text">Explorer</span></h1>
            <p>Дізнайтесь точну погоду та найкращі пам'ятки будь-якого міста світу за секунду</p>
            
            <form id="search-form" class="search-box">
                <input type="text" id="city-input" placeholder="Введіть місто (наприклад, Kyiv, Rome, Tokyo)..." value="Kyiv" required autocomplete="off">
                <button type="submit" id="search-btn">
                    <span>Дослідити</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </header>

        <!-- Loader -->
        <div id="loader" class="loader-container hidden">
            <div class="spinner"></div>
            <p>Збираємо свіжі прогнози та відгуки з Google Local...</p>
        </div>

        <!-- Error Message -->
        <div id="error-box" class="error-box hidden">
            <span id="error-text">Помилка завантаження</span>
        </div>

        <!-- Main Content (Hidden by default until loaded) -->
        <main id="content-area" class="content-area hidden">
            <!-- City Banner -->
            <div class="city-banner glass-card">
                <div>
                    <h2 id="display-city">Київ</h2>
                    <span class="date-badge" id="display-dates">2026-07-03 — 2026-07-08</span>
                </div>
            </div>

            <!-- Weather Section -->
            <section class="section">
                <div class="section-title">
                    <span class="icon">🌤️</span>
                    <h3>Прогноз погоди на 6 днів</h3>
                </div>
                <div id="weather-grid" class="weather-grid">
                    <!-- Cards will be inserted dynamically via JS -->
                </div>
            </section>

            <!-- Attractions Section -->
            <section class="section">
                <div class="section-title">
                    <span class="icon">🏛️</span>
                    <h3>Топ-10 пам'яток міста</h3>
                </div>
                <div id="places-grid" class="places-grid">
                    <!-- Cards will be inserted dynamically via JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
